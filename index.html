<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href="manifest.json">
<title>ORR Sector Tracker</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/polylabel@1.1.0/dist/polylabel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }

#map { position: fixed; inset: 0; z-index: 0; background: #e8e4dc; }
.leaflet-container { background: #e8e4dc !important; }

#banner {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 1000;
  background: #fff;
  border-bottom: 1px solid #dde3ed;
  padding: 12px 16px 10px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.12);
}
#banner-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #7a8499; margin-bottom: 3px; }
#sector-name { font-size: 32px; font-weight: 700; color: #1a6abf; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.15; }
#sector-name.unknown { color: #9aa0b0; font-style: italic; font-weight: 400; font-size: 22px; }
#sector-name.flash { animation: flash 0.7s ease; }
@keyframes flash { 0%{background:rgba(26,106,191,0.12);border-radius:4px;padding-left:6px} 100%{background:transparent;padding-left:0} }

#status-bar { display: flex; align-items: center; gap: 6px; margin-top: 5px; font-size: 11px; color: #7a8499; }
#gps-dot { width: 7px; height: 7px; border-radius: 50%; background: #b0b8c8; flex-shrink: 0; transition: background 0.3s; }
#gps-dot.active { background: #22a84a; animation: gppulse 2s infinite; }
#gps-dot.error  { background: #e03c3c; }
#gps-dot.warn   { background: #c97f0a; }
@keyframes gppulse { 0%,100%{opacity:1} 50%{opacity:0.45} }
#wl-pill { font-size: 10px; margin-left: auto; color: #b0b8c8; }
#wl-pill.on { color: #22a84a; }

#alert-banner {
  position: fixed; left: 0; right: 0; z-index: 999;
  background: #edfaf1; border-bottom: 2px solid #22a84a;
  padding: 8px 16px; font-size: 13px; color: #1a7a3a; font-weight: 600;
  display: none; pointer-events: none;
}
#alert-banner.visible { display: block; animation: slideDown 0.3s ease; }
@keyframes slideDown { from{transform:translateY(-8px);opacity:0} to{transform:translateY(0);opacity:1} }

#controls { position: fixed; bottom: 20px; right: 12px; display: flex; flex-direction: column; gap: 8px; z-index: 1000; }
.ctrl-btn {
  width: 44px; height: 44px; background: #fff; border: 1px solid #dde3ed;
  border-radius: 8px; color: #1a1f2e; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}
.ctrl-btn:active { background: #f0f3f8; }
#basemap-btn { font-size: 13px; font-weight: 700; letter-spacing: -0.5px; }
#center-btn.dimmed { opacity: 0.4; }

#splash {
  position: fixed; inset: 0; z-index: 9999; background: #fff;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
}
#splash-pulse { width: 72px; height: 72px; border-radius: 50%; background: rgba(26,106,191,0.12); display: flex; align-items: center; justify-content: center; animation: sp 1.8s ease-in-out infinite; }
@keyframes sp { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }
#splash h1 { font-size: 26px; font-weight: 700; color: #1a6abf; }
#splash p  { font-size: 15px; color: #7a8499; }
#splash button { padding: 14px 48px; background: #1a6abf; border: none; border-radius: 10px; color: #fff; font-size: 18px; font-weight: 600; cursor: pointer; -webkit-appearance: none; }

#config-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 2000; align-items: flex-end; justify-content: center; }
#config-overlay.open { display: flex; }
#config-panel { background: #fff; border: 1px solid #dde3ed; border-radius: 14px 14px 0 0; padding: 20px 16px 36px; width: 100%; max-width: 500px; }
#config-panel h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: #1a1f2e; }
.fg { margin-bottom: 13px; }
.fg label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #7a8499; display: block; margin-bottom: 5px; }
.fg input, .fg select { width: 100%; padding: 8px 10px; background: #f5f7fa; border: 1px solid #dde3ed; border-radius: 6px; color: #1a1f2e; font-size: 13px; }
.fg input:focus, .fg select:focus { outline: none; border-color: #1a6abf; }
.chk-row { display: flex; align-items: center; gap: 10px; }
.chk-row input[type=checkbox] { width: 16px; height: 16px; accent-color: #1a6abf; flex-shrink: 0; }
.chk-row label { font-size: 13px; color: #1a1f2e; font-weight: 400; text-transform: none; letter-spacing: 0; }
#save-btn { width: 100%; padding: 10px; background: #1a6abf; border: none; border-radius: 6px; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 6px; }
#close-cfg { float: right; background: none; border: none; color: #7a8499; font-size: 20px; cursor: pointer; }

.sector-label { background: none; border: none; box-shadow: none; font-size: 11px; font-weight: 700; color: #1a6abf; text-align: center; white-space: nowrap; text-shadow: 1px 1px 0 #fff,-1px -1px 0 #fff,1px -1px 0 #fff,-1px 1px 0 #fff; pointer-events: none; }
</style>
</head>
<body>

<div id="map"></div>

<div id="banner">
  <div style="display:flex;align-items:flex-start;justify-content:space-between;">
    <div style="flex:1;min-width:0;">
      <div id="banner-label">ORR Sector</div>
      <div id="sector-name" class="unknown">Locating…</div>
    </div>
    <button class="ctrl-btn" id="cfg-btn" style="margin-left:12px;flex-shrink:0;width:36px;height:36px;font-size:15px;">⚙</button>
  </div>
  <div id="status-bar">
    <div id="gps-dot"></div>
    <span id="gps-status">Starting…</span>
    <span id="coords-display" style="font-size:10px;"></span>
    <span id="wl-pill">⏻</span>
  </div>
</div>

<div id="alert-banner">Entered: <span id="alert-text"></span></div>

<div id="controls">
  <button class="ctrl-btn" id="center-btn" title="Center on me">◎</button>
  <button class="ctrl-btn" id="reload-btn" title="Reload sectors">↺</button>
  <button class="ctrl-btn" id="basemap-btn" title="Switch basemap">OSM</button>
</div>

<div id="splash">
  <div id="splash-pulse">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#1a6abf" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
    </svg>
  </div>
  <h1>ORR Sector Tracker</h1>
  <p>Tap to start tracking</p>
  <button id="start-btn">Start</button>
</div>

<div id="config-overlay">
  <div id="config-panel">
    <button id="close-cfg">✕</button>
    <h2>Settings</h2>
    <div class="fg"><label>Voice</label><select id="cfg-voice"></select></div>
    <div class="fg"><label>Alert on specific sector (blank = any)</label><input type="text" id="cfg-alert-sector" placeholder="exact sector name"></div>
    <div class="fg chk-row">
      <input type="checkbox" id="cfg-alert-any">
      <label for="cfg-alert-any">Alert + vibrate on every boundary crossing</label>
    </div>
    <button id="save-btn">Save &amp; Apply</button>
  </div>
</div>

<!-- Silent audio loop — keeps iOS Safari tab alive -->
<audio id="keepalive-audio" loop playsinline preload="auto" style="display:none">
  <source src="data:audio/mpeg;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4LjI5LjEwMAAAAAAAAAAAAAAA//tUwAAAAAAAAAAAAAAAAAAAAAAASW5mbwAAAA8AAAACAAABhgC7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA//tUxAADwAABpAAAACAAADSAAAAETEFNRTMuMTAwVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVU=" type="audio/mpeg"/>
</audio>

<script>
// ── CONFIG ────────────────────────────────────────────────
const FS_BASE = 'https://services1.arcgis.com/kILp9lqGUeOhnDbI/arcgis/rest/services/ORR_Sectors_view/FeatureServer';
const FIELD   = 'SEC_NAME';

let cfg = { url: FS_BASE, layer: 0, field: FIELD, alertSector: '', alertAny: true, voiceName: '' };
try { Object.assign(cfg, JSON.parse(localStorage.getItem('orrCfg') || '{}')); } catch(e) {}
function saveCfg() { try { localStorage.setItem('orrCfg', JSON.stringify(cfg)); } catch(e) {} }
function layerUrl() { return cfg.url + '/' + cfg.layer; }

// ── MAP ───────────────────────────────────────────────────
const map = L.map('map', { zoomControl: false, attributionControl: false, tap: false });

const basemaps = {
  gray: [
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Light_Gray_Base/MapServer/tile/{z}/{y}/{x}',      { maxZoom: 16 }),
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Light_Gray_Reference/MapServer/tile/{z}/{y}/{x}', { maxZoom: 16 })
  ],
  osm: [
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 })
  ]
};
let activeBasemap = 'gray';
basemaps.gray.forEach(l => l.addTo(map));
map.setView([35.9, -84.0], 9);

function switchBasemap() {
  const next = activeBasemap === 'gray' ? 'osm' : 'gray';
  basemaps[activeBasemap].forEach(l => map.removeLayer(l));
  basemaps[next].forEach(l => { l.addTo(map); l.bringToBack(); });
  if (sectorLayer) sectorLayer.bringToFront();
  activeBasemap = next;
  document.getElementById('basemap-btn').textContent = next === 'gray' ? 'OSM' : 'GRY';
}

function setPadding() {
  const h = document.getElementById('banner').offsetHeight;
  if (map.setPadding) map.setPadding({ top: h, bottom: 0 });
  document.getElementById('alert-banner').style.top = h + 'px';
}

// ── STATE ─────────────────────────────────────────────────
let sectorLayer = null, labelLayer = null, locMarker = null, accCircle = null;
let currentSector = null, watchId = null, alertTimer = null, qTimer = null;
let spokeSector = false;
let autoFollow = true;

// Disable auto-follow when user manually pans
map.on('dragstart', () => {
  autoFollow = false;
  document.getElementById('center-btn').classList.add('dimmed');
});

// ── KEEP-ALIVE ────────────────────────────────────────────
let wakeLock = null;

async function requestWakeLock() {
  if (!('wakeLock' in navigator)) { updateWlPill(false); return; }
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', () => { wakeLock = null; updateWlPill(false); });
    updateWlPill(true);
  } catch(e) { updateWlPill(false); }
}

function updateWlPill(on) {
  const p = document.getElementById('wl-pill');
  p.textContent = on ? '⏻ on' : '⏻';
  p.className = on ? 'on' : '';
}

document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible') {
    if (!wakeLock) requestWakeLock();
    startGPS(); // restart watch if it dropped
  }
});

function startSilentAudio() {
  const a = document.getElementById('keepalive-audio');
  a.volume = 0.001;
  a.play().catch(() => {});
}

function startHeartbeat() {
  setInterval(() => {
    if (!wakeLock) requestWakeLock();
    if (navigator.geolocation)
      navigator.geolocation.getCurrentPosition(() => {}, () => {}, { enableHighAccuracy: true, maximumAge: 10000, timeout: 5000 });
  }, 15000);
}

// ── SPEECH ────────────────────────────────────────────────
let selectedVoice = null;

function loadVoices() {
  if (!window.speechSynthesis) return;
  const voices = window.speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
  const sel = document.getElementById('cfg-voice');
  if (!sel || !voices.length) return;
  sel.innerHTML = voices.map((v, i) =>
    `<option value="${i}"${v.name === cfg.voiceName ? ' selected' : ''}>${v.name} (${v.lang})</option>`
  ).join('');
  selectedVoice = voices.find(v => v.name === cfg.voiceName) || voices[0];
}
if (window.speechSynthesis) { window.speechSynthesis.onvoiceschanged = loadVoices; loadVoices(); }

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  if (selectedVoice) u.voice = selectedVoice;
  u.rate = 0.95; u.pitch = 1; u.volume = 1;
  window.speechSynthesis.speak(u);
}

// ── SECTORS ───────────────────────────────────────────────
function featCentroid(feat) {
  const g = feat.geometry;
  try {
    let coords;
    if (g.type === 'Polygon') coords = g.coordinates;
    else if (g.type === 'MultiPolygon') coords = g.coordinates.reduce((a, b) => b[0].length > a[0].length ? b : a);
    if (coords) { const p = polylabel(coords, 0.001); return L.latLng(p[1], p[0]); }
  } catch(e) {}
  return L.geoJSON(feat).getBounds().getCenter();
}

async function reloadSectors() {
  if (sectorLayer) { map.removeLayer(sectorLayer); sectorLayer = null; }
  if (labelLayer)  { map.removeLayer(labelLayer);  labelLayer  = null; }
  setDot('warn'); setMsg('Loading sectors…');
  const q = `${layerUrl()}/query?where=1%3D1&outFields=${encodeURIComponent(cfg.field)}&returnGeometry=true&f=geojson`;
  try {
    const res  = await fetch(q);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const n = data.features ? data.features.length : 0;
    sectorLayer = L.geoJSON(data, {
      style: { color: '#1a6abf', weight: 2, opacity: 0.9, fillOpacity: 0.04, fillColor: '#1a6abf' },
      onEachFeature: (feat, lyr) => lyr.on('click', e => L.DomEvent.stopPropagation(e))
    }).addTo(map);
    labelLayer = L.layerGroup();
    data.features.forEach(feat => {
      const name = feat.properties[cfg.field];
      if (!name || !feat.geometry) return;
      L.marker(featCentroid(feat), {
        icon: L.divIcon({ className: 'sector-label', html: name, iconSize: null }),
        interactive: false
      }).addTo(labelLayer);
    });
    labelLayer.addTo(map);
    map.on('zoomend', () => {
      map.getZoom() >= 10
        ? (!map.hasLayer(labelLayer) && map.addLayer(labelLayer))
        : (map.hasLayer(labelLayer) && map.removeLayer(labelLayer));
    });
    if (map.getZoom() < 10) map.removeLayer(labelLayer);
    if (n > 0 && !locMarker) map.fitBounds(sectorLayer.getBounds(), { padding: [20, 20] });
    setDot('active'); setMsg(n + ' sectors loaded');
  } catch(e) { setDot('error'); setMsg('Sector load failed'); console.error(e); }
}

// ── GPS ───────────────────────────────────────────────────
function startGPS() {
  if (!navigator.geolocation) { setDot('error'); setMsg('Geolocation not supported'); return; }
  if (watchId != null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  setMsg('Acquiring GPS…');
  watchId = navigator.geolocation.watchPosition(onPos, onGpsErr, {
    enableHighAccuracy: true, maximumAge: 4000, timeout: 20000
  });
}

function onPos(pos) {
  const lat = pos.coords.latitude, lng = pos.coords.longitude, acc = pos.coords.accuracy;
  document.getElementById('coords-display').textContent = lat.toFixed(5) + ', ' + lng.toFixed(5);
  setDot('active');
  setMsg('GPS ±' + Math.round(acc) + ' m');

  const ll = [lat, lng];
  if (!locMarker) {
    locMarker = L.circleMarker(ll, { radius: 9, color: '#fff', fillColor: '#1a6abf', fillOpacity: 1, weight: 2.5, zIndexOffset: 1000 }).addTo(map);
    accCircle = L.circle(ll, { radius: acc, color: '#1a6abf', fillColor: '#1a6abf', fillOpacity: 0.08, weight: 0.5 }).addTo(map);
    map.setView(ll, 13);
    requestWakeLock();
  } else {
    locMarker.setLatLng(ll);
    accCircle.setLatLng(ll).setRadius(acc);
    if (autoFollow) map.panTo(ll, { animate: true, duration: 1 });
  }

  // Query what sector we're in — debounced 600 ms
  clearTimeout(qTimer);
  qTimer = setTimeout(() => doQuery(lat, lng), 600);
}

function onGpsErr(e) {
  const m = { 1: 'Location permission denied', 2: 'Position unavailable', 3: 'GPS timed out' };
  setDot('error');
  setMsg(m[e.code] || 'GPS error');
}

// ── SECTOR QUERY ──────────────────────────────────────────
async function doQuery(lat, lng) {
  const geom = encodeURIComponent(JSON.stringify({ x: lng, y: lat, spatialReference: { wkid: 4326 } }));
  const url = `${layerUrl()}/query?geometry=${geom}&geometryType=esriGeometryPoint&inSR=4326&spatialRel=esriSpatialRelWithin&outFields=${encodeURIComponent(cfg.field)}&returnGeometry=false&f=json`;
  try {
    const data = await (await fetch(url)).json();
    const feat = data.features && data.features[0];
    setSector(feat ? (feat.attributes[cfg.field] || 'Unknown') : null);
  } catch(e) { console.warn('Query error:', e); }
}

function setSector(name) {
  const el = document.getElementById('sector-name');
  const prev = currentSector;

  if (name === prev) {
    // Same sector — announce it once on first fix
    if (!spokeSector) {
      spokeSector = true;
      el.textContent = name || 'Outside sector coverage';
      el.className = name ? '' : 'unknown';
      speak(name ? 'Sector: ' + name : 'Outside sector coverage');
    }
    return;
  }

  // Sector changed
  currentSector = name;
  el.className = name ? '' : 'unknown';
  el.textContent = name || 'Outside sector coverage';
  void el.offsetWidth; // force reflow for flash animation
  if (name) el.classList.add('flash');

  if (spokeSector) {
    speak(name ? 'Entering ' + name : 'Outside sector coverage');
    if (name) fireAlert(name);
  } else {
    speak(name ? 'Sector: ' + name : 'Outside sector coverage');
  }
  spokeSector = true;
}

function fireAlert(name) {
  const hit = cfg.alertAny || (cfg.alertSector && name.toLowerCase() === cfg.alertSector.toLowerCase());
  if (!hit) return;
  document.getElementById('alert-text').textContent = name;
  const ab = document.getElementById('alert-banner');
  ab.classList.add('visible');
  clearTimeout(alertTimer);
  alertTimer = setTimeout(() => ab.classList.remove('visible'), 5000);
  if ('vibrate' in navigator) navigator.vibrate([80, 40, 80]);
}

// ── HELPERS ───────────────────────────────────────────────
function setDot(s) { document.getElementById('gps-dot').className = s; }
function setMsg(m) { document.getElementById('gps-status').textContent = m; }

function centerOnMe() {
  if (!locMarker) return;
  autoFollow = true;
  document.getElementById('center-btn').classList.remove('dimmed');
  map.setView(locMarker.getLatLng(), 13, { animate: true });
}

function openConfig() {
  loadVoices();
  document.getElementById('cfg-alert-sector').value = cfg.alertSector;
  document.getElementById('cfg-alert-any').checked   = cfg.alertAny;
  document.getElementById('config-overlay').classList.add('open');
}
function closeConfig() { document.getElementById('config-overlay').classList.remove('open'); }

function saveConfig() {
  const voices = window.speechSynthesis ? window.speechSynthesis.getVoices().filter(v => v.lang.startsWith('en')) : [];
  const vi = parseInt(document.getElementById('cfg-voice').value);
  if (!isNaN(vi) && voices[vi]) { selectedVoice = voices[vi]; cfg.voiceName = voices[vi].name; speak('Voice selected'); }
  cfg.alertSector = document.getElementById('cfg-alert-sector').value.trim();
  cfg.alertAny    = document.getElementById('cfg-alert-any').checked;
  saveCfg(); closeConfig();
}

// ── EVENT LISTENERS ───────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', () => {
  // Splash tap = first user gesture: unlock audio, speech, wake lock
  if (window.speechSynthesis) { const u = new SpeechSynthesisUtterance(''); u.volume = 0; window.speechSynthesis.speak(u); }
  startSilentAudio();
  requestWakeLock();
  startHeartbeat();
  document.getElementById('splash').style.display = 'none';
  setPadding();
  reloadSectors();
  startGPS();
});

document.getElementById('cfg-btn').addEventListener('click', openConfig);
document.getElementById('close-cfg').addEventListener('click', closeConfig);
document.getElementById('save-btn').addEventListener('click', saveConfig);
document.getElementById('center-btn').addEventListener('click', centerOnMe);
document.getElementById('reload-btn').addEventListener('click', reloadSectors);
document.getElementById('basemap-btn').addEventListener('click', switchBasemap);
document.getElementById('config-overlay').addEventListener('click', function(e) { if (e.target === this) closeConfig(); });

try {
  if ('serviceWorker' in navigator && location.protocol === 'https:')
    navigator.serviceWorker.register('./sw.js').catch(() => {});
} catch(e) {}
</script>
</body>
</html>
